# ============================================================================
# WebVH Server Build Recipe
# ============================================================================
#
# Drives `did-hosting-server setup --from <this-file>` non-interactively. The
# did-hosting-server hosts DID documents over HTTP and receives sync updates
# from the control plane over DIDComm.
#
# SECURITY: This file contains NO secrets.
# ============================================================================

[deployment]
service = "server"
vta_mode = "online"

[output]
config_path = "config.toml"

[server]
host = "0.0.0.0"
port = 8530
log_level = "info"
log_format = "text"
data_dir = "data/did-hosting-server"

[identity]
# Public URL that becomes the server's did:webvh identifier.
public_url = "https://server1.example.com"
# DIDComm mediator for runtime sync (NOT embedded in the DID document).
# mediator_did = "did:webvh:mediator.example.com"

# Control plane's DID for authenticating sync messages. The server
# refuses sync from any other DID once this is set.
# control_did = "did:webvh:..."
# Optional HTTP URL of the control plane (used by tooling, not the runtime).
# control_url = "https://control.example.com"

[vta]
did = "did:webvh:vta.example.com"
context_id = "webvh"

# ── Air-gapped (offline) setup ──────────────────────────────────────────────
# Both phases of the sealed-bundle flow run non-interactively from this
# same recipe file. Phase 1 writes a request + persists the ephemeral
# seed in the configured secret backend; phase 2 opens the sealed reply
# the VTA admin returned.
#
# Phase 1 (uncomment, set vta_mode = "offline-prepare" above):
# request_path = "bootstrap-request.json"
#
# Phase 2 (after the VTA admin returns the sealed bundle; switch
# vta_mode = "offline-complete" above):
# bundle_path   = "bundle.armor"
# expect_digest = "<lowercase-hex-sha256>"

[secrets]
backend = "keyring"
keyring_service = "webvh"

[admin]
mode = "skip"

[reprovision]
force = false
