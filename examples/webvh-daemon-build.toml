# ============================================================================
# WebVH Daemon Build Recipe
# ============================================================================
#
# Drives `webvh-daemon setup --from <this-file>` non-interactively.
# Ideal for CI / scripted deployments, reproducible builds, and sharing
# a standard setup across a team.
#
# SECURITY: This file contains NO secrets. Cryptographic material is
# generated by setup; cloud credentials are picked up from the
# environment (AWS / GCP / Azure standard auth chains).
#
# Env-var overrides (DAEMON_* prefix) layer over recipe values at load
# time — useful for templating one recipe across environments. See
# `docs/bootstrap_startup.md` for the full env-var matrix.
# ============================================================================

[deployment]
service = "daemon"
# vta_mode: "online" | "offline-prepare" | "offline-complete" | "self-managed"
#   online           — VTA reachable. Phase 1 (--setup-key-out) must run
#                      first; this recipe path is then phase 2 with
#                      --setup-key-file <path>.
#   offline-prepare  — air-gapped phase 1. Writes bootstrap-request.json
#                      + state TOML; persists the seed in the configured
#                      secret store. (Currently still requires the
#                      interactive `setup-offline-prepare` subcommand.)
#   offline-complete — air-gapped phase 2. Reads the sealed bundle
#                      identified by [vta].bundle_path / .expect_digest.
#   self-managed     — no VTA; the daemon generates its own keys and
#                      self-hosts a did:webvh. Daemon-only mode.
vta_mode = "online"

[output]
# Where to write the generated config.toml.
config_path = "config.toml"

[server]
# Listen address. Defaults to 0.0.0.0:8534 if omitted.
host = "0.0.0.0"
port = 8534
log_level = "info"     # info | debug | warn | error | trace
log_format = "text"    # text | json
data_dir = "data/daemon"

[identity]
# The daemon's public URL. Used for the DID's host component
# (.well-known by default; URL-path-derived otherwise).
public_url = "https://daemon.example.com"
# DIDComm mediator DID. Empty means no DIDComm — the daemon won't
# be reachable for tenant DID provisioning over DIDComm.
# mediator_did = "did:webvh:mediator.example.com"

[vta]
# Required for vta_mode = "online" (omit for self-managed):
did = "did:webvh:vta.example.com"
context_id = "webvh"

# vta_mode = "offline-prepare" requires this:
# request_path  = "bootstrap-request.json"
#
# vta_mode = "offline-complete" requires these:
# bundle_path   = "bundle.armor"
# expect_digest = "<lowercase-hex-sha256>"

[daemon]
# Which embedded services run. Defaults match the interactive wizard.
enable_control = true
enable_server  = true
enable_witness = true
enable_watcher = false

[secrets]
# Backend: "keyring" | "aws" | "gcp" | "azure" | "plaintext"
#   plaintext writes private keys into config.toml — dev only.
#   Requires confirm_plaintext = true as a defence against CI recipes
#   accidentally being used in production.
backend = "keyring"
keyring_service = "webvh"
# aws_region        = "us-east-1"
# aws_secret_name   = "webvh-daemon-secrets"
# gcp_project       = "my-project"
# gcp_secret_name   = "webvh-daemon-secrets"
# azure_vault_url   = "https://my-vault.vault.azure.net/"
# azure_secret_name = "webvh-daemon-secrets"
# confirm_plaintext = true

[admin]
# mode: "did" | "generate" | "skip"
#   did      — insert `[admin].did` into the ACL with role admin.
#   generate — mint a fresh did:key (private printed to stderr once).
#   skip     — leave the ACL empty; admin enrolment happens later via
#              `webvh-daemon invite --did <DID> --role admin`.
mode = "skip"
# did = "did:key:z6Mk..."

[reprovision]
# When true, the wizard rotates credentials and config even if a live
# install is detected. Backs up config.toml to config.toml.bak first.
# Equivalent to `--force-reprovision` on the CLI.
force = false
