# ============================================================================
# WebVH Witness Build Recipe
# ============================================================================
#
# Drives `webvh-witness setup --from <this-file>` non-interactively.
# The witness signs DID-log integrity proofs. Its DID is hosted on a
# webvh-server (set `did_hosting_url`).
#
# SECURITY: This file contains NO secrets.
# ============================================================================

[deployment]
service = "witness"
vta_mode = "online"

[output]
config_path = "config.toml"

[server]
host = "0.0.0.0"
port = 8531
log_level = "info"
log_format = "text"
data_dir = "data/webvh-witness"

[identity]
did_hosting_url = "https://did.example.com"
did_path = "services/witness"

# Mediator for inbound DIDComm (witness-proof requests).
# mediator_did = "did:webvh:mediator.example.com"

[vta]
did = "did:webvh:vta.example.com"
context_id = "webvh"

# Air-gapped flow — see webvh-server-build.toml for the full pattern.

[secrets]
backend = "keyring"
keyring_service = "webvh-witness"

[admin]
mode = "skip"

[reprovision]
force = false
