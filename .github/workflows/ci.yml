name: CI

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main, "release/**"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D warnings
  # Pinned MSRV — must equal `rust-version` in the workspace Cargo.toml.
  # Bumping one without the other causes silent drift.
  MSRV: "1.95.0"

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  msrv:
    name: MSRV ${{ env.MSRV }} build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Cargo.toml `rust-version` matches MSRV env var
        run: |
          declared=$(grep '^rust-version' Cargo.toml | head -n1 | sed -E 's/rust-version *= *"([^"]+)"/\1/')
          if [ "$declared" != "${{ env.MSRV }}" ]; then
            echo "::error::workspace rust-version ($declared) does not match CI MSRV (${{ env.MSRV }})"
            exit 1
          fi
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.MSRV }}
      - uses: Swatinem/rust-cache@v2
      - name: MSRV — build workspace (default features)
        run: cargo +${{ env.MSRV }} build --workspace --locked
      - name: MSRV — build webvh-common with every feature combination
        # Cloud-secret backends and non-default storage backends are gated
        # behind feature flags. They must also build at MSRV; otherwise a
        # 1.95-only API in (e.g.) aws-sdk-secretsmanager would slip through
        # the default-features build and break operator-driven feature
        # selections at the next minor release.
        run: |
          for feat in keyring aws-secrets gcp-secrets azure-secrets \
                     store-fjall store-redis store-dynamodb \
                     store-firestore store-cosmosdb passkey \
                     setup-wizard metrics; do
            echo "::group::MSRV build affinidi-webvh-common --features server-core,$feat"
            cargo +${{ env.MSRV }} build -p affinidi-webvh-common --locked \
              --no-default-features --features "server-core,$feat"
            echo "::endgroup::"
          done

  test:
    name: cargo test (${{ matrix.store }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Storage backends are mutually exclusive at the build-script level,
        # so each one needs its own job. Cloud backends (dynamodb, firestore,
        # cosmosdb) compile but don't run integration tests in CI — they need
        # external infra.
        include:
          - store: store-fjall
            features: "server-core,store-fjall,keyring,passkey,setup-wizard"
          - store: store-redis
            features: "server-core,store-redis"
          - store: store-dynamodb
            features: "server-core,store-dynamodb"
          - store: store-firestore
            features: "server-core,store-firestore"
          - store: store-cosmosdb
            features: "server-core,store-cosmosdb"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build webvh-common with ${{ matrix.store }}
        run: >
          cargo build -p affinidi-webvh-common --no-default-features
          --features "${{ matrix.features }}"
      - name: Test webvh-common with ${{ matrix.store }}
        # Default-feature test runs catch the bulk of the suite; here we just
        # confirm the alternate-store build compiles + its small unit slice
        # still passes.
        run: >
          cargo test -p affinidi-webvh-common --lib --no-default-features
          --features "${{ matrix.features }}"

  test-default:
    name: cargo test (default features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # `--locked` ensures Cargo.lock matches the workspace manifest exactly,
      # so a transitive dep bump cannot quietly land via the test job before
      # being explicitly bumped in Cargo.toml.
      - run: cargo test --workspace --locked
      # The setup-recipe example files (`examples/webvh-*-build.toml`) are
      # the operator-facing contract for non-interactive setup. The smoke
      # test loads each one, validates it, and fails the build on schema
      # drift. Gated on `server-core` because the recipe module lives
      # under `affinidi_webvh_common::server`.
      - name: setup-recipe examples parse + validate
        run: >
          cargo test -p affinidi-webvh-common --locked
          --features server-core --test recipe_examples
      # End-to-end smoke test for the offline-prepare (phase 1) recipe
      # path. Exercises `run_vta_for_recipe` + plaintext-store seed
      # round-trip; the only piece between this passing and a fully
      # air-gapped non-interactive install is the operator-ferried
      # sealed bundle that phase 2 opens.
      - name: setup-recipe offline phase 1 round-trip
        run: >
          cargo test -p affinidi-webvh-common --locked
          --features server-core --test offline_phase1

  keyring-required:
    name: keyring round-trip (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # Both targets where the workspace claims first-class keyring
        # support. macOS has Keychain; Linux gets a session bus + gnome-
        # keyring spun up explicitly so the test exercises a real Secret
        # Service implementation rather than silently skipping. Without
        # the explicit infrastructure the Linux runner has neither, so
        # the test would skip and a regression would land unnoticed.
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    env:
      KEYRING_TEST_REQUIRED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux Secret Service
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            dbus-x11 gnome-keyring libsecret-1-0 libsecret-1-dev
      - name: Run keyring round-trip on macOS
        if: matrix.os == 'macos-latest'
        run: >
          cargo test -p affinidi-webvh-common --lib
          --features server-core,store-fjall,keyring
          server::secret_store::keyring::tests::keyring_round_trip_when_backend_available
          --
          --nocapture
      - name: Run keyring round-trip on Linux (under dbus + gnome-keyring)
        if: matrix.os == 'ubuntu-latest'
        # `dbus-run-session` spins up a fresh session bus, then
        # `gnome-keyring-daemon --unlock` boots the keyring and prints the
        # `DBUS_SESSION_BUS_ADDRESS` and `GNOME_KEYRING_CONTROL` exports
        # the test process consumes via env. The unlock password is
        # piped via stdin per gnome-keyring-daemon's `--unlock` contract.
        run: |
          dbus-run-session -- bash -c '
            set -euo pipefail
            echo -n "ci-test-password" | gnome-keyring-daemon --unlock
            eval "$(echo -n "ci-test-password" | gnome-keyring-daemon --start)"
            export GNOME_KEYRING_CONTROL DBUS_SESSION_BUS_ADDRESS
            cargo test -p affinidi-webvh-common --lib \
              --features server-core,store-fjall,keyring \
              server::secret_store::keyring::tests::keyring_round_trip_when_backend_available \
              -- --nocapture
          '

  cloud-secrets-build:
    name: cargo build (cloud secret backends)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend:
          - aws-secrets
          - gcp-secrets
          - azure-secrets
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: >
          cargo build -p affinidi-webvh-common --no-default-features
          --features "server-core,${{ matrix.backend }}"

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  publish-dry-run:
    name: cargo publish --dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # webvh-common is publishable on its own. The other crates depend on
      # it via `version = "0.6"` + path, so cargo refuses to dry-run them
      # until common is on crates.io. Verifying the leaf is enough to catch
      # packaging mistakes (manifests, exclude/include, missing files) on
      # every PR; the actual publish sequence happens manually after a tag.
      - name: cargo package --list (sanity)
        run: cargo package --list -p affinidi-webvh-common
      - name: cargo publish --dry-run (webvh-common)
        run: cargo publish --dry-run --allow-dirty -p affinidi-webvh-common
